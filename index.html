<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#a53a2a">
<link rel="manifest" href="manifest.json">
<title>Forge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a2e;--card:#16213e;--text:#e8e8e8;--muted:#8899aa;--accent:#a53a2a;--warm:#d4a373;--green:#2ecc71;--red:#e74c3c;--yellow:#f39c12;--border:#2a3a5e;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:70px;-webkit-tap-highlight-color:transparent}
.container{max-width:600px;margin:0 auto;padding:12px}
h1{font-size:22px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
h2{font-size:16px;color:var(--warm);margin:16px 0 8px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{background:var(--card);border-radius:var(--radius);padding:14px 10px;text-align:center;border:1px solid var(--border)}
.stat .num{font-size:28px;font-weight:700;color:var(--accent)}
.stat .lbl{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;min-height:44px;min-width:44px;transition:opacity .2s}
.btn:active{opacity:.7}
.btn-sm{padding:8px 14px;font-size:12px}
.btn-outline{background:transparent;border:1px solid var(--accent);color:var(--accent)}
.btn-warm{background:var(--warm);color:#1a1a2e}
.btn-green{background:var(--green)}
.btn-red{background:var(--red)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
input,select,textarea{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:14px;width:100%;min-height:44px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
label{display:block;font-size:12px;color:var(--muted);margin:8px 0 4px;text-transform:uppercase}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.list-item{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:8px;border:1px solid var(--border);position:relative}
.list-item .title{font-weight:600;margin-bottom:4px}
.list-item .meta{font-size:12px;color:var(--muted)}
.list-item .actions{position:absolute;top:10px;right:10px;display:flex;gap:6px}
.list-item .actions button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;min-width:30px;min-height:30px;display:flex;align-items:center;justify-content:center}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase}
.badge-new{background:#2980b9;color:#fff}
.badge-contacted{background:#8e44ad;color:#fff}
.badge-quoted{background:var(--yellow);color:#1a1a2e}
.badge-scheduled{background:var(--warm);color:#1a1a2e}
.badge-completed{background:var(--green);color:#fff}
.badge-lost{background:var(--red);color:#fff}
.badge-todo{background:var(--muted);color:#fff}
.badge-in-progress{background:var(--yellow);color:#1a1a2e}
.badge-done{background:var(--green);color:#fff}
.badge-low{background:#3498db;color:#fff}
.badge-medium{background:var(--yellow);color:#1a1a2e}
.badge-high{background:#e67e22;color:#fff}
.badge-urgent{background:var(--red);color:#fff}
.badge-paid{background:var(--green);color:#fff}
.badge-open{background:var(--yellow);color:#1a1a2e}
.progress-bar{background:var(--bg);border-radius:6px;height:8px;overflow:hidden;margin-top:4px}
.progress-bar .fill{height:100%;border-radius:6px;transition:width .3s}
.search{margin-bottom:12px}
.filter-row{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.filter-row select{width:auto;min-width:100px}
.tab-content{display:none}
.tab-content.active{display:block}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius);padding:20px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;border:1px solid var(--border)}
.modal h2{margin-top:0}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;background:none;border:none;color:var(--muted);padding:8px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;min-height:54px;font-family:inherit;transition:color .2s}
nav button.active{color:var(--accent)}
nav button .icon{font-size:22px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.tel{color:var(--warm);text-decoration:none}
.money-green{color:var(--green)}
.money-red{color:var(--red)}
.chart-bar{display:flex;align-items:flex-end;gap:4px;height:120px;padding:8px 0;margin:8px 0}
.chart-bar .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.chart-bar .col .bar{width:100%;border-radius:4px 4px 0 0;min-height:2px;transition:height .3s}
.chart-bar .col .bar-label{font-size:9px;color:var(--muted);writing-mode:vertical-lr;transform:rotate(180deg);max-height:40px;overflow:hidden}
.chart-bar .col .bar-val{font-size:9px;color:var(--muted)}
.mini-table{width:100%;font-size:13px;border-collapse:collapse}
.mini-table th{text-align:left;padding:6px 4px;color:var(--muted);border-bottom:1px solid var(--border);font-weight:600;font-size:11px;text-transform:uppercase}
.mini-table td{padding:8px 4px;border-bottom:1px solid var(--border)}
.sync-badge{font-size:10px;color:var(--muted);background:var(--bg);padding:3px 8px;border-radius:12px;display:inline-block}
</style>
</head>
<body>

<!-- ===== DASHBOARD ===== -->
<div id="tab-dashboard" class="tab-content active">
<div class="container">
<h1>⚒️ Forge</h1>
<div class="stat-grid">
<div class="stat"><div class="num" id="d-tasks">0</div><div class="lbl">Active Tasks</div></div>
<div class="stat"><div class="num" id="d-leads">0</div><div class="lbl">Customers</div></div>
<div class="stat"><div class="num" id="d-streak">0</div><div class="lbl">Day Streak</div></div>
</div>
<div class="stat-grid" style="grid-template-columns:1fr 1fr">
<div class="stat"><div class="num money-green" id="d-revenue">$0</div><div class="lbl">Revenue (2025)</div></div>
<div class="stat"><div class="num money-red" id="d-net">$0</div><div class="lbl">Net Income</div></div>
</div>

<h2>Recent Invoices</h2>
<div id="d-invoices"></div>

<h2>Quick Actions</h2>
<div class="btn-row">
<button class="btn" onclick="openTab('tasks');openTaskModal()">+ Task</button>
<button class="btn btn-warm" onclick="openTab('leads');openLeadModal()">+ Lead</button>
<button class="btn btn-outline" onclick="openTab('finance')">📊 Finances</button>
</div>
</div>
</div>

<!-- ===== TASKS ===== -->
<div id="tab-tasks" class="tab-content">
<div class="container">
<h1>✅ Tasks</h1>
<input type="text" class="search" placeholder="Search tasks..." id="task-search" oninput="renderTasks()">
<div class="filter-row">
<select id="task-filter-status" onchange="renderTasks()"><option value="all">All Status</option><option value="todo">To Do</option><option value="in-progress">In Progress</option><option value="done">Done</option></select>
<select id="task-filter-priority" onchange="renderTasks()"><option value="all">All Priority</option><option value="urgent">Urgent</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select>
<button class="btn btn-sm" onclick="openTaskModal()">+ Add</button>
</div>
<div id="task-list"></div>
</div>
</div>

<!-- ===== CUSTOMERS ===== -->
<div id="tab-customers" class="tab-content">
<div class="container">
<h1>👥 Customers</h1>
<div class="stat-grid" style="grid-template-columns:1fr 1fr 1fr">
<div class="stat"><div class="num" id="c-total">0</div><div class="lbl">Total</div></div>
<div class="stat"><div class="num money-green" id="c-revenue">$0</div><div class="lbl">Revenue</div></div>
<div class="stat"><div class="num" id="c-avg">$0</div><div class="lbl">Avg Job</div></div>
</div>
<input type="text" class="search" placeholder="Search customers..." id="cust-search" oninput="renderCustomers()">
<div id="cust-list"></div>

<h2>Invoices</h2>
<div id="inv-list"></div>
</div>
</div>

<!-- ===== FINANCE ===== -->
<div id="tab-finance" class="tab-content">
<div class="container">
<h1>💰 Finance</h1>
<div class="sync-badge" id="qb-sync-time"></div>

<!-- Year selector -->
<div class="btn-row" style="margin-bottom:8px">
<button class="btn btn-sm btn-warm" id="fy-2025" onclick="setFinYear('2025')">2025</button>
<button class="btn btn-sm btn-outline" id="fy-2026" onclick="setFinYear('2026')">2026</button>
<button class="btn btn-sm btn-outline" id="fy-all" onclick="setFinYear('all')">All Time</button>
</div>

<!-- Month selector (scrollable) -->
<div style="overflow-x:auto;white-space:nowrap;padding:4px 0 12px;-webkit-overflow-scrolling:touch" id="month-selector"></div>

<!-- Year/All summary stats -->
<div class="stat-grid" style="grid-template-columns:1fr 1fr 1fr">
<div class="stat"><div class="num money-green" id="f-revenue" style="font-size:20px">$0</div><div class="lbl">Revenue</div></div>
<div class="stat"><div class="num money-red" id="f-biz-exp" style="font-size:20px">$0</div><div class="lbl">Biz Expenses</div></div>
<div class="stat"><div class="num" id="f-net" style="font-size:20px">$0</div><div class="lbl">Net</div></div>
</div>
<div class="stat-grid" style="grid-template-columns:1fr 1fr">
<div class="stat"><div class="num" id="f-personal" style="font-size:18px;color:var(--yellow)">$0</div><div class="lbl">Personal (Amex)</div></div>
<div class="stat"><div class="num" id="f-jobs" style="font-size:18px">0</div><div class="lbl">Jobs</div></div>
</div>

<!-- Monthly detail content -->
<div id="fin-detail"></div>

<!-- View toggles -->
<div class="btn-row" style="margin-top:16px">
<button class="btn btn-sm btn-outline" onclick="setFinView('categories')">📊 Categories</button>
<button class="btn btn-sm btn-outline" onclick="setFinView('balance')">🏦 Balance Sheet</button>
<button class="btn btn-sm btn-outline" onclick="setFinView('copilot')">👤 Personal</button>
<button class="btn btn-sm btn-outline" onclick="setFinView('tax')">🎯 Tax Prep</button>
</div>
<div id="fin-extra"></div>
</div>
</div>

<!-- ===== LEADS ===== -->
<div id="tab-leads" class="tab-content">
<div class="container">
<h1>🎯 Leads</h1>
<div class="filter-row">
<select id="lead-filter" onchange="renderLeads()"><option value="all">All Status</option><option value="new">New</option><option value="contacted">Contacted</option><option value="quoted">Quoted</option><option value="scheduled">Scheduled</option><option value="completed">Completed</option><option value="lost">Lost</option></select>
<button class="btn btn-sm" onclick="openLeadModal()">+ Add</button>
</div>
<div id="lead-list"></div>
</div>
</div>

<!-- ===== NOTES ===== -->
<div id="tab-notes" class="tab-content">
<div class="container">
<h1>📝 Notes</h1>
<button class="btn btn-sm" onclick="openNoteModal()" style="margin-bottom:12px">+ New Note</button>
<div id="note-list"></div>
</div>
</div>

<!-- ===== MODALS ===== -->
<div class="modal-overlay" id="modal-task">
<div class="modal">
<h2 id="task-modal-title">New Task</h2>
<input type="hidden" id="task-edit-id">
<label>Title</label><input type="text" id="task-title" placeholder="What needs to be done?">
<div class="form-row">
<div><label>Priority</label><select id="task-priority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option><option value="urgent">Urgent</option></select></div>
<div><label>Category</label><select id="task-category"><option value="red-clay">Red Clay</option><option value="personal">Personal</option><option value="business">Business</option><option value="learning">Learning</option></select></div>
</div>
<div class="form-row">
<div><label>Status</label><select id="task-status"><option value="todo">To Do</option><option value="in-progress">In Progress</option><option value="done">Done</option></select></div>
<div><label>Due Date</label><input type="date" id="task-due"></div>
</div>
<div class="btn-row" style="margin-top:16px">
<button class="btn" onclick="saveTask()">Save</button>
<button class="btn btn-outline" onclick="closeModal('modal-task')">Cancel</button>
</div>
</div>
</div>

<div class="modal-overlay" id="modal-lead">
<div class="modal">
<h2 id="lead-modal-title">New Lead</h2>
<input type="hidden" id="lead-edit-id">
<label>Name</label><input type="text" id="lead-name" placeholder="Customer name">
<div class="form-row">
<div><label>Phone</label><input type="tel" id="lead-phone" placeholder="(334) 555-1234"></div>
<div><label>Source</label><select id="lead-source"><option value="google">Google</option><option value="yelp">Yelp</option><option value="referral">Referral</option><option value="facebook">Facebook</option><option value="nextdoor">Nextdoor</option><option value="phone">Phone</option></select></div>
</div>
<label>Service Needed</label><input type="text" id="lead-service" placeholder="Spring replacement, opener repair...">
<label>Status</label><select id="lead-status"><option value="new">New</option><option value="contacted">Contacted</option><option value="quoted">Quoted</option><option value="scheduled">Scheduled</option><option value="completed">Completed</option><option value="lost">Lost</option></select>
<label>Notes</label><textarea id="lead-notes" placeholder="Any details..."></textarea>
<div class="btn-row" style="margin-top:16px">
<button class="btn" onclick="saveLead()">Save</button>
<button class="btn btn-outline" onclick="closeModal('modal-lead')">Cancel</button>
</div>
</div>
</div>

<div class="modal-overlay" id="modal-note">
<div class="modal">
<h2 id="note-modal-title">New Note</h2>
<input type="hidden" id="note-edit-id">
<label>Note</label><textarea id="note-text" rows="8" placeholder="Write something..."></textarea>
<div class="btn-row" style="margin-top:16px">
<button class="btn" onclick="saveNote()">Save</button>
<button class="btn btn-outline" onclick="closeModal('modal-note')">Cancel</button>
</div>
</div>
</div>

<!-- ===== NAV ===== -->
<nav>
<button class="active" onclick="openTab('dashboard')"><span class="icon">🏠</span>Home</button>
<button onclick="openTab('tasks')"><span class="icon">✅</span>Tasks</button>
<button onclick="openTab('customers')"><span class="icon">👥</span>Clients</button>
<button onclick="openTab('finance')"><span class="icon">💰</span>Finance</button>
<button onclick="openTab('leads')"><span class="icon">🎯</span>Leads</button>
<button onclick="openTab('notes')"><span class="icon">📝</span>Notes</button>
</nav>

<script src="qb-data.js"></script>
<script>
// === DATA LAYER ===
const store = {
  get(key, def=[]) { try { return JSON.parse(localStorage.getItem('forge_'+key)) || def } catch { return def } },
  set(key, val) { localStorage.setItem('forge_'+key, JSON.stringify(val)) },
  id() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6) }
};

// QB data from qb-data.js
const QB = window.QB_DATA || {};

// === TAB NAVIGATION ===
function openTab(name) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  const tabs = ['dashboard','tasks','customers','finance','leads','notes'];
  const idx = tabs.indexOf(name);
  if(idx >= 0) document.querySelectorAll('nav button')[idx].classList.add('active');
  if(name==='dashboard') renderDashboard();
  if(name==='tasks') renderTasks();
  if(name==='customers') renderCustomers();
  if(name==='finance') renderFinance();
  if(name==='leads') renderLeads();
  if(name==='notes') renderNotes();
}
function closeModal(id) { document.getElementById(id).classList.remove('show') }
function showModal(id) { document.getElementById(id).classList.add('show') }
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if(e.target === m) m.classList.remove('show') });
});

// === HELPERS ===
function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }
function fmt(n) { return '$' + Math.abs(n).toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0}); }
function fmtDec(n) { return '$' + Math.abs(n).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}); }
function bar(pct,color) { return `<div class="progress-bar"><div class="fill" style="width:${Math.min(pct,100).toFixed(0)}%;background:${color||'var(--accent)'}"></div></div>`; }

// === DASHBOARD ===
function renderDashboard() {
  const tasks = store.get('tasks');
  const active = tasks.filter(t => t.status !== 'done').length;
  document.getElementById('d-tasks').textContent = active;
  document.getElementById('d-leads').textContent = (QB.customers||[]).length;
  document.getElementById('d-streak').textContent = calcStreak();

  // QB financials
  const pnl = QB.pnl2025 || {};
  document.getElementById('d-revenue').textContent = fmt(pnl.income || 0);
  const net = pnl.netIncome || 0;
  const netEl = document.getElementById('d-net');
  netEl.textContent = (net < 0 ? '-' : '') + fmt(net);
  netEl.className = 'num ' + (net >= 0 ? 'money-green' : 'money-red');

  // Recent invoices
  const invEl = document.getElementById('d-invoices');
  const invoices = (QB.invoices || []).slice(0, 5);
  if(!invoices.length) { invEl.innerHTML = '<div class="empty">No invoices</div>'; return; }
  invEl.innerHTML = invoices.map(inv => `<div class="list-item" style="padding:10px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-weight:600">${esc(inv.customer)}</div><div class="meta">#${inv.number} · ${inv.date}</div></div>
      <div style="text-align:right"><div class="money-green" style="font-weight:700;font-size:16px">${fmtDec(inv.total)}</div>
      <span class="badge badge-${inv.status.toLowerCase()}">${inv.status}</span></div>
    </div>
  </div>`).join('');
}

function calcStreak() {
  const tasks = store.get('tasks').filter(t => t.status === 'done' && t.completedAt);
  if(!tasks.length) return 0;
  const days = [...new Set(tasks.map(t => t.completedAt.slice(0,10)))].sort().reverse();
  let streak = 0, d = new Date(); d.setHours(0,0,0,0);
  for(const day of days) {
    const check = d.toISOString().slice(0,10);
    if(day === check) { streak++; d.setDate(d.getDate()-1); } else break;
  }
  return streak;
}

// === CUSTOMERS ===
function renderCustomers() {
  const customers = QB.customers || [];
  const invoices = QB.invoices || [];
  const search = (document.getElementById('cust-search')?.value||'').toLowerCase();

  // Stats
  const totalRev = invoices.reduce((s,i) => s + i.total, 0);
  const avgJob = invoices.length ? totalRev / invoices.length : 0;
  document.getElementById('c-total').textContent = customers.length;
  document.getElementById('c-revenue').textContent = fmt(totalRev);
  document.getElementById('c-avg').textContent = fmt(avgJob);

  // Customer list with invoice totals
  let custData = customers.map(c => {
    const custInv = invoices.filter(i => i.customerId === c.id || i.customer === c.name);
    const total = custInv.reduce((s,i) => s + i.total, 0);
    return { ...c, invoiceCount: custInv.length, totalRevenue: total, invoices: custInv };
  }).sort((a,b) => b.totalRevenue - a.totalRevenue);

  if(search) custData = custData.filter(c => c.name.toLowerCase().includes(search));

  const el = document.getElementById('cust-list');
  if(!custData.length) { el.innerHTML = '<div class="empty">No customers found</div>'; return; }
  el.innerHTML = custData.map(c => `<div class="list-item" style="padding:12px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-weight:600;font-size:15px">${esc(c.name)}</div>
        <div class="meta">${c.invoiceCount} job${c.invoiceCount!==1?'s':''} · Since ${c.created || 'N/A'}
        ${c.phone ? ` · <a href="tel:${c.phone}" class="tel" onclick="event.stopPropagation()">📞 ${esc(c.phone)}</a>` : ''}
        ${c.email ? ` · <a href="mailto:${c.email}" style="color:var(--warm);text-decoration:none" onclick="event.stopPropagation()">✉️</a>` : ''}
        </div>
      </div>
      <div style="text-align:right">
        <div class="money-green" style="font-weight:700;font-size:18px">${c.totalRevenue ? fmtDec(c.totalRevenue) : '—'}</div>
      </div>
    </div>
    ${c.invoices.length ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
      ${c.invoices.map(i => `<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:13px">
        <span class="meta">#${i.number} · ${i.date}</span>
        <span style="font-weight:600">${fmtDec(i.total)}</span>
      </div>`).join('')}
    </div>` : ''}
  </div>`).join('');

  // All invoices
  const invEl = document.getElementById('inv-list');
  invEl.innerHTML = invoices.map(inv => `<div class="list-item" style="padding:10px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-weight:600">${esc(inv.customer)}</div>
      <div class="meta">#${inv.number} · ${inv.date}${inv.lines.length ? ' · ' + esc(inv.lines[0].description) : ''}</div></div>

let finYear = '2025';
let finMonth = 'all';

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function setFinYear(y) {
  finYear = y;
  finMonth = 'all';
  ['2025','2026','all'].forEach(x => {
    const btn = document.getElementById('fy-'+x);
    if(x===y) { btn.classList.add('btn-warm'); btn.classList.remove('btn-outline'); }
    else { btn.classList.remove('btn-warm'); btn.classList.add('btn-outline'); }
  });
  renderFinance();
}

function setFinMonth(m) {
  finMonth = m;
  renderFinance();
}

function setFinView(view) {
  const el = document.getElementById('fin-extra');
  if(view === 'categories') renderCategoriesView(el);
  else if(view === 'balance') renderBalanceView(el);
  else if(view === 'copilot') renderCopilotView(el);
  else if(view === 'tax') renderTaxView(el);
}

function getFilteredMonths() {
  const detail = QB.monthlyDetail || {};
  const months = Object.keys(detail).sort();
  if(finYear === 'all') return months;
  return months.filter(m => m.startsWith(finYear));
}

function renderFinance() {
  document.getElementById('qb-sync-time').textContent = QB.lastSync ? 'Synced: ' + new Date(QB.lastSync).toLocaleString() : '';

  // Month selector
  const allMonths = getFilteredMonths();
  const monthSel = document.getElementById('month-selector');
  monthSel.innerHTML = `<button class="btn btn-sm ${finMonth==='all'?'btn-warm':'btn-outline'}" onclick="setFinMonth('all')" style="margin-right:4px">All</button>` +
    allMonths.map(m => {
      const [y,mo] = m.split('-');
      const label = MONTH_NAMES[parseInt(mo)-1] + (finYear==='all' ? ' '+y.slice(2) : '');
      return `<button class="btn btn-sm ${finMonth===m?'btn-warm':'btn-outline'}" onclick="setFinMonth('${m}')" style="margin-right:4px">${label}</button>`;
    }).join('');

  // Calculate totals for selected period
  const detail = QB.monthlyDetail || {};
  const invMonthly = QB.invoiceMonthly || {};
  const months = finMonth === 'all' ? allMonths : [finMonth];

  let totalBiz = 0, totalPersonal = 0, totalRevenue = 0, totalJobs = 0;
  months.forEach(m => {
    if(detail[m]) { totalBiz += detail[m].business; totalPersonal += detail[m].personal; }
    if(invMonthly[m]) { totalRevenue += invMonthly[m].total; totalJobs += invMonthly[m].count; }
  });

  // Also add revenue from P&L if viewing all of a year (invoices may not cover everything)
  const pnl = finYear === '2025' ? (QB.pnl2025||{}) : finYear === '2026' ? (QB.pnl2026||{}) : {};
  if(finMonth === 'all' && pnl.income && pnl.income > totalRevenue) totalRevenue = pnl.income;

  const net = totalRevenue - totalBiz;

  document.getElementById('f-revenue').textContent = fmt(totalRevenue);
  document.getElementById('f-biz-exp').textContent = fmt(totalBiz);
  const netEl = document.getElementById('f-net');
  netEl.textContent = (net < 0 ? '-' : '+') + fmt(net);

// === TASKS ===
function openTaskModal(id) {
  const t = id ? store.get('tasks').find(x => x.id===id) : null;
  document.getElementById('task-modal-title').textContent = t ? 'Edit Task' : 'New Task';
  document.getElementById('task-edit-id').value = t ? t.id : '';
  document.getElementById('task-title').value = t ? t.title : '';
  document.getElementById('task-priority').value = t ? t.priority : 'medium';
  document.getElementById('task-category').value = t ? t.category : 'personal';
  document.getElementById('task-status').value = t ? t.status : 'todo';
  document.getElementById('task-due').value = t ? (t.due||'') : '';
  showModal('modal-task');
}
function saveTask() {
  const title = document.getElementById('task-title').value.trim();
  if(!title) return;
  const editId = document.getElementById('task-edit-id').value;
  const tasks = store.get('tasks');
  const now = new Date().toISOString();
  const status = document.getElementById('task-status').value;
  if(editId) {
    const idx = tasks.findIndex(t => t.id===editId);
    if(idx>-1) {
      const wasNotDone = tasks[idx].status !== 'done';
      tasks[idx] = {...tasks[idx], title, priority: document.getElementById('task-priority').value, category: document.getElementById('task-category').value, status, due: document.getElementById('task-due').value, updatedAt: now};
      if(status === 'done' && wasNotDone) tasks[idx].completedAt = now;
    }
  } else {
    tasks.push({id: store.id(), title, priority: document.getElementById('task-priority').value, category: document.getElementById('task-category').value, status, due: document.getElementById('task-due').value, createdAt: now, updatedAt: now, completedAt: status==='done' ? now : null});
  }
  store.set('tasks', tasks);
  closeModal('modal-task');
  renderTasks();
}
function deleteTask(id) { store.set('tasks', store.get('tasks').filter(t => t.id !== id)); renderTasks(); }
function cycleTaskStatus(id) {
  const tasks = store.get('tasks');
  const t = tasks.find(x => x.id===id);
  if(!t) return;
  const cycle = ['todo','in-progress','done'];
  t.status = cycle[(cycle.indexOf(t.status)+1) % cycle.length];
  if(t.status === 'done') t.completedAt = new Date().toISOString();
  t.updatedAt = new Date().toISOString();
  store.set('tasks', tasks);
  renderTasks();
}
function renderTasks() {
  let tasks = store.get('tasks');
  const search = (document.getElementById('task-search')?.value||'').toLowerCase();
  const fStatus = document.getElementById('task-filter-status')?.value||'all';
  const fPri = document.getElementById('task-filter-priority')?.value||'all';
  if(search) tasks = tasks.filter(t => t.title.toLowerCase().includes(search));
  if(fStatus!=='all') tasks = tasks.filter(t => t.status===fStatus);
  if(fPri!=='all') tasks = tasks.filter(t => t.priority===fPri);
  tasks.sort((a,b) => { const po = {urgent:0,high:1,medium:2,low:3}; return po[a.priority] !== po[b.priority] ? po[a.priority]-po[b.priority] : (b.updatedAt||'').localeCompare(a.updatedAt||''); });
  const el = document.getElementById('task-list');
  if(!tasks.length) { el.innerHTML = '<div class="empty">No tasks found</div>'; return; }
  el.innerHTML = tasks.map(t => `<div class="list-item" onclick="cycleTaskStatus('${t.id}')">
    <div class="actions"><button onclick="event.stopPropagation();openTaskModal('${t.id}')">✏️</button><button onclick="event.stopPropagation();deleteTask('${t.id}')">🗑️</button></div>
    <div class="title">${esc(t.title)}</div>
    <div class="meta"><span class="badge badge-${t.status}">${t.status}</span> <span class="badge badge-${t.priority}">${t.priority}</span> ${t.category} ${t.due ? '· Due '+t.due : ''}</div>
  </div>`).join('');
}

  if(!leads.length) { el.innerHTML = '<div class="empty">No leads yet</div>'; return; }
  el.innerHTML = leads.map(l => `<div class="list-item">
    <div class="actions"><button onclick="openLeadModal('${l.id}')">✏️</button><button onclick="deleteLead('${l.id}')">🗑️</button></div>
    <div class="title">${esc(l.name)}</div>
    <div class="meta"><span class="badge badge-${l.status}">${l.status}</span> ${l.service ? '· '+esc(l.service) : ''} · via ${l.source}</div>
    ${l.phone ? `<div class="meta" style="margin-top:4px"><a href="tel:${l.phone}" class="tel" onclick="event.stopPropagation()">📞 ${esc(l.phone)}</a></div>` : ''}
    ${l.notes ? `<div class="meta" style="margin-top:4px">${esc(l.notes)}</div>` : ''}
  </div>`).join('');
}

// === NOTES ===
function openNoteModal(id) {
  const n = id ? store.get('notes').find(x => x.id===id) : null;
  document.getElementById('note-modal-title').textContent = n ? 'Edit Note' : 'New Note';
  document.getElementById('note-edit-id').value = n ? n.id : '';
  document.getElementById('note-text').value = n ? n.text : '';
  showModal('modal-note');
}
function saveNote() {
  const text = document.getElementById('note-text').value.trim();
  if(!text) return;
  const editId = document.getElementById('note-edit-id').value;
  const notes = store.get('notes');
  const now = new Date().toISOString();
  if(editId) { const idx = notes.findIndex(n => n.id===editId); if(idx>-1) notes[idx] = {...notes[idx], text, updatedAt: now}; }
  else { notes.push({id: store.id(), text, createdAt: now, updatedAt: now}); }
  store.set('notes', notes);
  closeModal('modal-note');
  renderNotes();
}
function deleteNote(id) { store.set('notes', store.get('notes').filter(n => n.id !== id)); renderNotes(); }
function renderNotes() {
  const notes = store.get('notes').slice().reverse();
  const el = document.getElementById('note-list');
  if(!notes.length) { el.innerHTML = '<div class="empty">No notes yet</div>'; return; }
  el.innerHTML = notes.map(n => `<div class="list-item">
    <div class="actions"><button onclick="openNoteModal('${n.id}')">✏️</button><button onclick="deleteNote('${n.id}')">🗑️</button></div>
    <div style="white-space:pre-wrap">${esc(n.text)}</div>
    <div class="meta" style="margin-top:6px">${new Date(n.updatedAt||n.createdAt).toLocaleString()}</div>
  </div>`).join('');
}

// === INIT ===
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
renderDashboard();
</script>
</body>
